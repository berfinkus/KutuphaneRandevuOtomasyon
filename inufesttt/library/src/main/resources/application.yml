server:
  port: 8080

spring:
  datasource:
    # Supabase PostgreSQL JDBC URL'si buraya gelecek
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/akillikutuphane}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

